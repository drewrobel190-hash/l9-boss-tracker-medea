<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Closed</title>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0b0b;
  color:white;
  font-family:Arial, Helvetica, sans-serif;
  text-align:center;
}

/* CARD */
.box{
  padding:45px 60px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  max-width:600px;
  backdrop-filter: blur(10px);

  /* animations */
  animation: fadeIn 1.2s ease, float 6s ease-in-out infinite;
}

/* TITLE */
h1{
  font-size:42px;
  margin-bottom:14px;

  animation: glow 3s ease-in-out infinite;
}

/* TEXT */
p{
  font-size:18px;
  opacity:0.8;
  animation: fadeIn 2s ease;
}

/* Fade animation */
@keyframes fadeIn{
  from{
    opacity:0;
    transform: translateY(30px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* Floating card */
@keyframes float{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-10px); }
  100%{ transform: translateY(0px); }
}

/* Soft glowing title */
@keyframes glow{
  0%{ text-shadow: 0 0 5px rgba(255,255,255,0.1); }
  50%{ text-shadow: 0 0 15px rgba(255,255,255,0.35); }
  100%{ text-shadow: 0 0 5px rgba(255,255,255,0.1); }
}
</style>
</head>
<body>
  <div class="box">
    <h1>Website Closed</h1>
    <p>Our Timer is Currently unavailable due to the conflict</p>
    <p>But Raiden Mei is still Active!</p>
  </div>
</body>
</html>
